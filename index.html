<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            margin: 0;
            font-family: Poppins, sans-serif;
            background: #0e0e0e;
            color: white;
            overflow-x: hidden;
        }

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px;
        }

        .left {
            max-width: 50%;
            animation: fadeInLeft 1.5s ease;
        }

        .left h1 {
            font-size: 50px;
            margin: 0;
            line-height: 1.2;
        }

        .left p {
            font-size: 18px;
            margin-top: 10px;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            border-radius: 8px;
            background: #00d0ff;
            color: black;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        /* Animation */
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
